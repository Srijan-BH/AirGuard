<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirGuard AI - Historical Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="mesh-bg"></div>

    <div class="layout-container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div style="font-weight: 800; font-size: 1.5rem; letter-spacing: -0.05em; color: var(--text-primary); margin-bottom: 8px; display: flex; align-items: center; gap: 10px;">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                AirGuard AI
            </div>
            <div style="font-size: 1rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 32px; padding-left: 2px;">Workspace</div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18M9 21V9"/></svg>
                    Analytics
                </a>
                <a href="prediction.html" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    Live AQI & Predict
                </a>
                <a href="history.html" class="sidebar-link active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                    Historical Data
                </a>
                <a href="profile.html" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    User Profile
                </a>
            </nav>

            <div style="margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 8px;">
                <button id="theme-toggle" class="btn-secondary" style="width: 100%; justify-content: flex-start; gap: 8px;">
                    🌓 Toggle Theme
                </button>
                <button class="btn-secondary" onclick="logout()" style="width: 100%; justify-content: flex-start; gap: 8px; color: var(--danger);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main" style="display: flex; flex-direction: column; gap: 24px;">
            <header style="display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 24px; border-bottom: 1px solid var(--border-subtle);">
                <div>
                    <h1 style="font-size: 1.8rem; margin-bottom: 4px;">Historical Records</h1>
                    <p style="color: var(--text-secondary); font-size: 0.95rem;">Review your past predictions and AQI searches.</p>
                </div>
            </header>

            <div class="glass-panel" style="padding: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <input type="text" id="historySearchInput" class="modern-input" placeholder="Search by location..." style="width: 250px;">
                        <button id="historyFilterBtn" class="btn-secondary" onclick="window.applyFilter()">Filter</button>
                        <select id="historySortSelect" class="modern-input" style="width: 200px; padding-right: 32px;" onchange="window.applyFilter()">
                            <option value="time_desc">Sort by Time (Newest)</option>
                            <option value="time_asc">Sort by Time (Oldest)</option>
                            <option value="alpha_asc">Location (A-Z)</option>
                            <option value="alpha_desc">Location (Z-A)</option>
                        </select>
                    </div>
                    <button id="historyExportBtn" class="btn-secondary">Export to CSV</button>
                </div>

                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;">
                                <th style="padding: 16px 12px; font-weight: 600;">Date & Time</th>
                                <th style="padding: 16px 12px; font-weight: 600;">Location</th>
                                <th style="padding: 16px 12px; font-weight: 600;">AQI</th>
                                <th style="padding: 16px 12px; font-weight: 600;">Status</th>
                                <th style="padding: 16px 12px; font-weight: 600; text-align: right;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-subtle);">
                    <div id="entryCountText" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Showing 0 entries</div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-secondary" disabled>Previous</button>
                        <button class="btn-secondary">Next</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        gsap.from(".glass-panel", { y: 20, opacity: 0, duration: 0.6, ease: "power2.out" });
        
        // Load history from localStorage
        let historyArr = JSON.parse(localStorage.getItem('searchHistory') || '[]');
        let filteredArr = [...historyArr];
        
        function renderTable(data) {
            const tbody = document.getElementById('historyTableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="padding: 32px; text-align: center; color: var(--text-secondary);">No historical records found.</td></tr>';
                document.getElementById('entryCountText').innerText = `Showing 0 entries`;
                return;
            }
            
            let rowsHtml = '';
            data.forEach(item => {
                const locName = item.location || item.city || 'Unknown';
                rowsHtml += `
                    <tr style="border-bottom: 1px solid var(--border-subtle); transition: background 0.2s;">
                        <td style="padding: 16px 12px; font-size: 0.95rem;">${item.date}</td>
                        <td style="padding: 16px 12px; font-weight: 500;">${locName}</td>
                        <td style="padding: 16px 12px; font-weight: 700; color: ${item.color};">${item.aqi}</td>
                        <td style="padding: 16px 12px;">
                            <span class="badge" style="background: ${item.color}; padding: 4px 10px; border-radius: 12px; color: white; font-size: 0.8rem;">${item.status}</span>
                        </td>
                        <td style="padding: 16px 12px; text-align: right;">
                            <button class="btn-secondary" style="padding: 8px 16px; font-size: 0.9rem;" onclick="window.location.href='prediction.html?city=' + encodeURIComponent('${locName}')">Check Live</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = rowsHtml;
            
            // Re-apply hover effects
            document.querySelectorAll('tbody tr').forEach(row => {
                row.addEventListener('mouseenter', () => { row.style.background = 'var(--bg-secondary)'; });
                row.addEventListener('mouseleave', () => { row.style.background = 'transparent'; });
            });
            
            // Update counter
            const entryCount = document.getElementById('entryCountText');
            if(entryCount) entryCount.innerText = `Showing 1 to ${data.length} of ${data.length} entries`;
        }

        renderTable(filteredArr);
        
        // Filter logic
        const searchInput = document.getElementById('historySearchInput');
        const filterBtn = document.getElementById('historyFilterBtn');
        
        window.applyFilter = function() {
            try {
                const query = searchInput.value.toLowerCase().trim();
                const sortMethod = document.getElementById('historySortSelect').value;
                
                if (!query) {
                    filteredArr = [...historyArr];
                    // Removed 'Cleared filter' toast as it gets annoying when sorting
                } else {
                    filteredArr = historyArr.filter(item => {
                        const locStr = (item.location || item.city || '').toLowerCase();
                        return locStr.includes(query);
                    });
                    if (typeof window.showToast === 'function') window.showToast(`Found ${filteredArr.length} results`, 'success');
                }
                
                // Apply Sorting
                filteredArr.sort((a, b) => {
                    if (sortMethod.startsWith('alpha')) {
                        const locA = (a.location || a.city || '').toLowerCase();
                        const locB = (b.location || b.city || '').toLowerCase();
                        return sortMethod === 'alpha_asc' ? locA.localeCompare(locB) : locB.localeCompare(locA);
                    } else {
                        // Time sort (requires parsing the date string "MM/DD/YYYY, h:mm AM")
                        const timeA = new Date(a.date).getTime();
                        const timeB = new Date(b.date).getTime();
                        return sortMethod === 'time_desc' ? timeB - timeA : timeA - timeB;
                    }
                });
                
                renderTable(filteredArr);
            } catch(err) {
                if (typeof window.showToast === 'function') window.showToast('Error applying filter', 'error');
                console.error(err);
            }
        };
        
        filterBtn.addEventListener('click', window.applyFilter);
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') window.applyFilter();
        });
        
        // Export logic
        const exportBtn = document.getElementById('historyExportBtn');
        exportBtn.addEventListener('click', () => {
            if (filteredArr.length === 0) {
                if (typeof window.showToast === 'function') window.showToast('No data to export', 'error');
                return;
            }
            
            let csvContent = "Date,Location,AQI,Status\n";
            filteredArr.forEach(item => {
                const locName = item.location || item.city || 'Unknown';
                // Escape quotes and wrap in quotes for CSV safety
                const date = `"${item.date.replace(/"/g, '""')}"`;
                const loc = `"${locName.replace(/"/g, '""')}"`;
                const aqi = `"${item.aqi}"`;
                const status = `"${item.status.replace(/"/g, '""')}"`;
                csvContent += `${date},${loc},${aqi},${status}\n`;
            });
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "airguard_history_export.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            if (typeof window.showToast === 'function') window.showToast('CSV Exported Successfully!', 'success');
        });
    </script>
</body>
</html>
